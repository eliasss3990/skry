name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela corridas viejas del mismo ref si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build, lint y tests del cliente en Linux, dentro de la imagen de build
  # dockerizada (paridad exacta con el desarrollo local, ADR-0004).
  client-linux:
    name: Cliente (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Construir imagen de build
        run: docker build -t skry-build-client:local -f build/client.Dockerfile .

      # Usa el mismo wrapper que el desarrollo local: corre como usuario no-root
      # (mapea el uid del runner) con CARGO_HOME local. Paridad exacta y sin root.
      - name: Formato
        run: scripts/dev cargo fmt --check

      - name: Clippy
        run: scripts/dev cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: scripts/dev cargo test

  # Build y tests del cliente en Windows nativo (sin cross-compile, ADR-0004).
  # Las libs nativas (FFmpeg/SDL2) se instalan con vcpkg cuando el crate de video
  # las requiera; por ahora valida los crates sin deps nativas.
  client-windows:
    name: Cliente (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain Rust
        uses: dtolnay/rust-toolchain@1.83.0
        with:
          components: clippy, rustfmt

      - name: Cache de cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client

      - name: Tests (crates sin deps nativas)
        run: cargo test -p skry-proto -p skry-adb -p transport-spike

  # FFmpeg via vcpkg en su propio job: es lo lento (~25 min). Cachea el resultado
  # para que el job de compilación itere rápido sin rebuildearlo cada vez.
  windows-ffmpeg:
    name: FFmpeg Windows (vcpkg)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache de vcpkg (FFmpeg)
        id: cache
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-ffmpeg-static-md-${{ hashFiles('client/vcpkg.json') }}
      # Modo clásico (desde la raíz, sin vcpkg.json en el cwd) -> C:\vcpkg\installed.
      - name: FFmpeg vía vcpkg
        if: steps.cache.outputs.cache-hit != 'true'
        run: vcpkg install "ffmpeg[avcodec,avformat,swscale,swresample]:x64-windows-static-md"

  # Binario de Windows del cliente `skry`. Restaura el FFmpeg cacheado, compila
  # (FFmpeg vía vcpkg + SDL2 bundled) y sube el .exe como artefacto descargable.
  windows-bin:
    name: Binario Windows (skry)
    needs: windows-ffmpeg
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain Rust
        uses: dtolnay/rust-toolchain@1.83.0

      - name: Restaurar FFmpeg (vcpkg) del cache
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-ffmpeg-static-md-${{ hashFiles('client/vcpkg.json') }}
          restore-keys: |
            vcpkg-ffmpeg-static-md-

      - name: Cache de cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client

      - name: Compilar skry (release)
        working-directory: client
        env:
          # Linkeo: vcpkg descubre las libs estáticas de FFmpeg.
          VCPKG_ROOT: C:\vcpkg
          VCPKGRS_TRIPLET: x64-windows-static-md
          # bindgen: ffmpeg-sys no le pasa el include a clang (defaultea a
          # /usr/include); se lo damos explícito (barras / para evitar escapes).
          BINDGEN_EXTRA_CLANG_ARGS: "-IC:/vcpkg/installed/x64-windows-static-md/include"
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
          # CMake 4.x removió la compatibilidad con minimums < 3.5; el SDL2 que
          # compila sdl2-sys (bundled) pide uno viejo. Esto le dice que lo tolere.
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: cargo build --release --locked -p skry

      - name: Subir el binario
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: skry-windows-x64
          path: client/target/release/skry.exe

  # Publica el binario como release al pushear un tag (vX.Y.Z). Es lo que
  # consumen los install scripts (scripts/install.{sh,ps1}). Solo corre en tags.
  release:
    name: Release
    needs: windows-bin
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: skry-windows-x64
      - name: Nombrar el asset como esperan los install scripts
        run: mv skry.exe skry-x86_64-pc-windows-msvc.exe
      - name: Crear el GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: skry-x86_64-pc-windows-msvc.exe

  # Módulo Kotlin/JVM del server (protocolo). No necesita Android SDK; corre en
  # la imagen de gradle como usuario no-root. Valida la paridad del wire con Rust.
  server-protocol:
    name: Server protocolo (Kotlin/JVM)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - name: Tests del modulo protocol
        run: |
          docker run --rm --user "$(id -u):$(id -g)" \
            -e GRADLE_USER_HOME=/work/.gradle-home \
            -v "$PWD":/work -w /work \
            gradle:8.7-jdk21@sha256:afba668dbed80665ed2cee8b16010c51e9639be3424c3f897637701bdd89371b \
            ./gradlew :protocol:test --no-daemon

  # App Android nativa (Kotlin/Compose, ADR 0008). Build del APK debug dentro de
  # la imagen dockerizada (mismo wrapper que el desarrollo local). Sube el APK
  # como artefacto. El runtime real es el teléfono; CI sólo valida que compila.
  app-android:
    name: App Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Construir imagen de build Android
        run: docker build -t skry-build-android:local -f build/android.Dockerfile .

      - name: Build APK debug
        run: scripts/android gradle :app:assembleDebug

      - name: Subir APK debug
        uses: actions/upload-artifact@v4
        with:
          name: skry-app-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
