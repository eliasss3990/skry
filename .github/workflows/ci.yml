name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela corridas viejas del mismo ref si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build, lint y tests del cliente en Linux, dentro de la imagen de build
  # dockerizada (paridad exacta con el desarrollo local, ADR-0004).
  client-linux:
    name: Cliente (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Construir imagen de build
        run: docker build -t skry-build-client:local -f build/client.Dockerfile .

      # Usa el mismo wrapper que el desarrollo local: corre como usuario no-root
      # (mapea el uid del runner) con CARGO_HOME local. Paridad exacta y sin root.
      - name: Formato
        run: scripts/dev cargo fmt --check

      - name: Clippy
        run: scripts/dev cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: scripts/dev cargo test

  # Build y tests del cliente en Windows nativo (sin cross-compile, ADR-0004).
  # Las libs nativas (FFmpeg/SDL2) se instalan con vcpkg cuando el crate de video
  # las requiera; por ahora valida los crates sin deps nativas.
  client-windows:
    name: Cliente (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain Rust
        uses: dtolnay/rust-toolchain@1.83.0
        with:
          components: clippy, rustfmt

      - name: Cache de cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client

      - name: Tests (crates sin deps nativas)
        run: cargo test -p skry-proto -p skry-adb

  # Módulo Kotlin/JVM del server (protocolo). No necesita Android SDK; corre en
  # la imagen de gradle como usuario no-root. Valida la paridad del wire con Rust.
  server-protocol:
    name: Server protocolo (Kotlin/JVM)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - name: Tests del modulo protocol
        run: |
          docker run --rm --user "$(id -u):$(id -g)" \
            -e GRADLE_USER_HOME=/work/.gradle-home \
            -v "$PWD":/work -w /work \
            gradle:8.7-jdk21@sha256:afba668dbed80665ed2cee8b16010c51e9639be3424c3f897637701bdd89371b \
            ./gradlew :protocol:test --no-daemon
